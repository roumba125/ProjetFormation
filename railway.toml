[build]
builder = "nixpacks"
buildCommand = "composer install --no-dev --optimize-autoloader && npm ci && npm run build"

[deploy]
startCommand = "php artisan migrate --force && php artisan storage:link && php artisan config:cache && php artisan route:cache && frankenphp run --config /etc/frankenphp/Caddyfile"

[variables]
NODE_VERSION = "20"